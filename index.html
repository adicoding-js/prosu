var audioCtx = null
var gainNode = null
var audioBuffer = null
var audioSrc = null
var audioLoaded = false
var audioStartOffset = 0

document.getElementById('audioUpload').addEventListener('change', function(e)
{ var file = e.target.files[0]
if (!file) return 
var reader = new FileReader()
reader.onload = function(ev) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
        audioCtx.decodeAudioData(ev.target.result, function (buf) {
        audioBuffer = buf
        console.log('audio loaded!!', buf.duration)
        }, function() {
            alert('didnt work')
        }
)}
    reader.readAsArrayBuffer(file)
})

document.getElementById('volumeslider').addEventListener('input', function() {
    if (gainNode) gainNode.gain.value = this.value
    document.getElementById('vollabel').textContent = 'volume: ' + Math.round(this.value * 100) + '%'
})

function startAudio() {
    if (audioSrc) {
        try { audioSrc.stop() } catch(err) { console.log('audio already stopped or whatever') }
        audioSrc = null
    }
    audioLoaded = false
 
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    audioCtx.resume()
 
    gainNode = audioCtx.createGain()
    gainNode.gain.value = parseFloat(document.getElementById('volumeslider').value)
    gainNode.connect(audioCtx.destination)
 
    if (audioBuffer) {
        audioSrc = audioCtx.createBufferSource()
        audioSrc.buffer = audioBuffer
        audioSrc.connect(gainNode)
        audioSrc.start(0)
        audioStartOffset = audioCtx.currentTime
        audioLoaded = true
        console.log('audio started!!')
    } else {
        console.log('no audio file, using silent clock')
    }
}

canvas.addEventListener('mousedown', function(e3) {
    if (gamestate != 'playing') return
    var r3 = canvas.getBoundingClientRect()
    var sx3 = canvas.width / r3.width
    var sy3 = canvas.height / r3.height
    var cx3 = (e3.clientX - r3.left) * sx3
    var cy3 = (e3.clientY - r3.top) * sy3

    for (var i = activeCircles.length - 1; i >= 0; i--) {
        var c = activeCircles[i]
        var dx = cx3 - c.x
        var dy = cy3 - c.y
        if (Math.sqrt(dx*dx + dy*dy) <= c.radius) {
            var now2 = Date.now() - gamestartTime
            var diff = Math.abs(now2 - c.hitTime)
            var judgetxt = ''
            var judgeColor = ''
            if (diff <= window300) { score += 300; count300 += 1; judgetxt = '300'; judgeColor = '#4a90d9' }
            else if (diff <= window100) { score += 100; count100 += 1; judgetxt = '100'; judgeColor = '#57c96e' }
            else if (diff <= window50) { score += 50; count50 += 1; judgetxt = '50'; judgeColor = '#888888' }
            else { console.log('too early') }
            jp.push({ x: c.x, y: c.y, text: judgetxt, color: judgeColor, startTime: Date.now() })
            combo += 1
            hitAnims.push({ x: c.x, y: c.y, radius: c.radius, startTime: Date.now(), type: 'hit' })
            c.dead = true
            activeCircles.splice(i, 1)
            break
        }
    }

    for (var _shi = activeSliders.length - 1; _shi >= 0; _shi--) {
        var _shl = activeSliders[_shi]
        if (_shl.hit) continue
        var _sdx = cx3 - _shl.x
        var _sdy = cy3 - _shl.y
        if (Math.sqrt(_sdx*_sdx + _sdy*_sdy) <= hitRaduis) {
            _shl.hit = true
            _shl.holdStartTime = Date.now()
            hitAnims.push({ x: _shl.x, y: _shl.y, radius: hitRaduis, startTime: Date.now(), type: 'hit' })
            jp.push({ x: _shl.x, y: _shl.y, text: '300', color: '#4a90d9', startTime: Date.now() })
            break
        }
    }
})

    var obj = mapObj.objects[i]
    if (obj.type  == 'circle') {
      Circles.push({
         x: obj.x,
         y: obj.y,
         radius: hitRaduis,
         number: i + 1,
         color: '#4a90d9',
         spawnTime: obj.time - pMs,
         hitTime: obj.time,
         spawned: false,
         dead: false
})

}

total = Circles.length
gamestartTime = Date.now()
gamestate = 'playing'

function getGrade() {
var t = count300 * 300 + count100 * 100 + count50 * 50
var m = total * 300
var a = m > 0 ? ( t / m) * 100 : 0
if( a >= 95) return 'Goated'
if ( a>= 90) return 'A-Tier Elite'
if ( a >= 80) return 'B-Tier Average' 
if ( a >= 70) return 'C-Tier Hobbyist'
return 'NOOB'
}

 var accStr = accuracy.toFixed(2) + '%'

  var c = Circles[i]
   if (now >= c.spawnTime && !c.spawned && !c.dead) {
    c.spawned = true
activeCircles.push(c)
}
}

for (var i = activeCircles.length - 1; i >= 0; i--) {
  var c = activeCircles[i]
if (now > c.hitTime + 200) {
 console.log('miss', c.number)

c.dead = true
activeCircles.splice(i, 1)
}
}

for (var i = 0; i < activeCircles.length; i++) {
  var c = activeCircles[i]


 var t = (now - c.spawnTime) / (c.hitTime - c.spawnTime)
    if ( t > 1) t=1

 var approachR = c.radius * 3 - (c.radius * 3 - c.radius) * t

ctx.beginPath()
ctx.arc(c.x, c.y, approachR, 0, Math.PI * 2)
ctx.strokeStyle = '#ffffff'
ctx.lineWidth = 2
ctx.stroke()

ctx.beginPath()
ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2)
ctx.fillStyle = c.color
ctx.fill()
ctx.strokeStyle = '#ffffff'
ctx.lineWidth = 3
ctx.stroke()

ctx.font = 'bold 24px Arial'
ctx.fillStyle = '#ffffff'
ctx.textAlign = 'center'
ctx.textBaseline = 'middle'
ctx.fillText(c.number, c.x, c.y)
ctx.textBaseline = 'alphabetic'
}

var nowMs = Date.now()
for (var i = hitAnims.length - 1; i >= 0; i--) {
  var a = hitAnims[i]
  var elapsed = nowMs - a.startTime
  if (elapsed > 150) {
    hitAnims.splice(i, 1)
    continue
  }
  var progress = elapsed / 150
  var alpha = 1 - progress
  if (a.type == 'hit') {
    var shrinkR = a.radius * (1 - progress * 0.5)
    ctx.beginPath()
    ctx.arc(a.x, a.y, shrinkR, 0, Math.PI * 2)
    ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')'
    ctx.fill()
  } else {
    ctx.beginPath()
    ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2)
    ctx.fillStyle = 'rgba(220,50,50,' + alpha + ')'
    ctx.fill()
  }
}

for (var i = jp.length - 1; i >= 0; i--) {
  var jp2 = judgementPopups[i]
  var jElapsed = nowMs - jp2.startTime
if (jElapsed > 600 ) {
    judgementPopups.splice(i, 1) 
continue }

var jProgress = jElapsed / 600
var jAlpha = 1 - jProgress
var jy = jp2.y - jProgress * 30
ctx.font = 'bold 24px helvetica'
ctx.fillStyle = 'rgba(' + hexToRgb(jp2.color) + ',' + jAlpha + ')'
ctx.textAlign = 'center'
ctx.textBaseline = 'middle'

}

ctx.beginPath()

ctx.beginPath()

}

  setTimeout(function() { gamestate = 'results'}, 700 )
}

function getRealGrade() {
    var th = count300*300 + count100*100 + count50*50
    var mh = total * 300
    var acc = mh > 0 ? (th/mh)*100 : 100
    if (acc >= 95) return 'GOATED'
    if (acc >= 90) return 'A-Tier Elite'
    if ( acc >= 75) return 'B-Tier Average'
    if ( acc >= 60) return 'C-Tier Hobbiest'
return 'Noob'
}


function saveScore(mapId, diff, obj) {
    var k = 'lb_' + mapId + '_' + diff
    var list = []
  try {
        list = JSON.parse(localStorage.getItem(k)) || []
  } catch(e) { list = [] }
    list.push(obj)
    list.sort(function(a,b){return b.score - a.score })
    if (list.length > 10) list.length = 10
    localStorage.setItem(k, JSON.stringify(list))
}

function getTotalStats() {
    var t300 = 0, t100 = 0, t50 = 0, tmiss = 0
    var bestcombo = 0
    var playsPerMap = {}
    var diffslist2 = [diffEasy, diffNormal, diffHard]

    for (var mi = 0; mi < maps.length; mi++) {
        var mm = maps[mi]
        playsPerMap[mm.id] = 0
          for (var dii = 0; dii < diffslist2.length; dii++) {
            var lb2 = getLeaderBoard(mm.id, diffslist2[dii].label)
              for (var li2 = 0; li2 < lb2.length; li2 ++) {
                  var ee = lb2[li2]
                  playsPerMap[mm.id]++
                  t300 += ee.counts ? ee.counts[300] || 0 : 0
                  t100 += ee.counts ? ee.counts[100] || 0 : 0
                  t50 += ee.counts ? ee.counts[50] || 0 : 0
                  tmiss += ee.counts ? ee.counts.miss || 0 : 0
                    if (ee.maxCombo > bestcombo) bestcombo = ee.maxCombo
              }
          }             
}

  var allNotes = t300 + t100 + t50 + tmiss
  var weighted = t300*300 + t100*100 + t50*50
  var maxP = allNotes * 300
  var overallAcc2 = maxP > 0? (weighted/ maxP) * 100 : 0

  var mostPlayedTitle = 'none'
  var mostPlayedCount = 0 
  for ( var mapId in playsPerMap) {
      if (playsPerMap[mapId] > mostPlayedCount) {
          mostPlayedCount = playsPerMap[mapId]
            for (var mi2 = 0; mi2 < maps.length; mi2++) {
                  if (maps[mi2].id == mapId) { mostPlayedTitle = maps[mi2].title; break}
            }
      }
  }

    return {
            t300: t300, t100: t100, t50: t50, tmiss: tmiss,
            bestcombo: bestcombo ,
            overallAcc: overallAcc2.toFixed(2),
            mostplayed: mostPlayedTitle
    }
}

function getBestGradesPerMap() {
        var diffList3 = [diffEasy, diffNormal, diffHard]
        var out = []
        for (var mi3 = 0; mi3 < maps.length; mi3++) {
        var mm2 = maps[mi3]
        var bestGrade = '-'
        var bestSc = 0
        for (var dii2 = 0; dii2 < diffList3.length; dii2++) {
            var lb3 = getLeaderBoard(mm2.id, diffList3[dii2].label)
            if (lb3.length > 0 && lb3[0].score > bestSc)  {
                bestSc = lb3[0].score
                bestGrade = lb3[0].grade
            }
        }
out.push({ title: mm2.title, grade: bestGrade})
        } 
return out
}

var _drawPreSlider = draw
draw = function() {
    _drawPreSlider()
    if (gamestate != 'playing') return
    var _sNow = Date.now() - gamestartTime
    if (audioLoaded) _sNow = (audioCtx.currentTime - audioStartOffset) * 1000
    for (var _spi = slidersPending.length - 1; _spi >= 0; _spi--) {
        if (_sNow >= slidersPending[_spi].spawnTime) {

        }
    }
    for (var _asi = activeSliders.length - 1; _asi >= 0; _asi--) {
        var _asl = activeSliders[_asi]
        if (!_asl.hit && _sNow > _asl.time + window50) {
            combo = 0
            countMiss += 1
            jp.push({ x: _asl.x, y: _asl.y, text: 'MISS', color: '#e05555', startTime: Date.now() })
            hitAnims.push({ x: _asl.x, y: _asl.y, radius: hitRaduis, startTime: Date.now(), type: 'miss' })
            activeSliders.splice(_asi, 1)
            continue
        }
        if (_asl.hit && !_asl.released) {
            var oneRepeatTime = _asl.duration / _asl.repeats
            var totalElapsed = Date.now() - _asl.holdStartTime
            var repsDone = Math.floor(totalElapsed / oneRepeatTime)
            if (repsDone >= _asl.repeats) {
                score += 300
                count300 += 1
                combo += 1
                if (combo > maxCombo) maxCombo = combo
                var endpX = _asl.repeats % 2 == 0 ? _asl.x : _asl.endX
                var endpY = _asl.repeats % 2 == 0 ? _asl.y : _asl.endY
                jp.push({ x: endpX, y: endpY, text: '300', color: '#4a90d9', startTime: Date.now() })
                hitAnims.push({ x: endpX, y: endpY, radius: hitRaduis, startTime: Date.now(), type: 'hit' })
                _asl.released = true
                _asl.dead = true
                activeSliders.splice(_asi, 1)
                continue
            }
            var segProgress = (totalElapsed % oneRepeatTime) / oneRepeatTime
            _asl.dir = repsDone % 2 == 0 ? 1 : -1
            if (_asl.dir == -1) segProgress = 1 - segProgress
            _asl.ballProgress = segProgress
        }
        ctx.beginPath()
        ctx.moveTo(_asl.x, _asl.y)
        ctx.lineTo(_asl.endX, _asl.endY)
        ctx.strokeStyle = 'rgba(74,144,217,0.3)'
        ctx.lineWidth = hitRaduis * 2
        ctx.lineCap = 'round'
        ctx.stroke()
        ctx.lineCap = 'butt'
        if (!_asl.hit) {
            var _sat = (_sNow - _asl.spawnTime) / (_asl.time - _asl.spawnTime)
            if (_sat > 1) _sat = 1
            ctx.beginPath()
            ctx.arc(_asl.x, _asl.y, hitRaduis * 3 - (hitRaduis * 3 - hitRaduis) * _sat, 0, Math.PI * 2)
            ctx.strokeStyle = '#ffffff'
            ctx.lineWidth = 2
            ctx.stroke()
        }
        ctx.beginPath()
        ctx.arc(_asl.x, _asl.y, hitRaduis, 0, Math.PI * 2)
        ctx.fillStyle = activeSkin.circleColor
        ctx.fill()
        ctx.strokeStyle = activeSkin.circleBorder
        ctx.lineWidth = 3
        ctx.stroke()
        ctx.beginPath()
        ctx.arc(_asl.endX, _asl.endY, hitRaduis * 0.65, 0, Math.PI * 2)
        ctx.strokeStyle = '#ffffff'
        ctx.lineWidth = 2
        ctx.stroke()
        if (_asl.repeats > 1) {
            ctx.font = 'bold 16px Arial'
            ctx.fillStyle = '#ffffff'
            ctx.textAlign = 'center'
            ctx.textBaseline = 'middle'
            ctx.fillText('>', _asl.endX, _asl.endY)
            ctx.textBaseline = 'alphabetic'
        }
        if (_asl.hit) {
            var ballX = _asl.x + (_asl.endX - _asl.x) * _asl.ballProgress
            var ballY = _asl.y + (_asl.endY - _asl.y) * _asl.ballProgress
            ctx.beginPath()
            ctx.arc(ballX, ballY, hitRaduis * 0.7, 0, Math.PI * 2)
            ctx.fillStyle = '#ffffff'
            ctx.fill()
            ctx.strokeStyle = activeSkin.circleBorder
            ctx.lineWidth = 2
            ctx.stroke()
        }
    }
}

var _spinTotalRot = 0 
var _spinActive = false 

document.addEventListener('mousemove', function(emv2) { 
    if (!_spinActive || gamestate != 'playing') return 
    var rmv2 = canvas.getBoundingClientRect() 
    var sxmv2 = canvas.width / rmv2.width 
    var symv2 = canvas.height / rmv2.height 
    var mxmv2 = (emv2.clientX - rmv2.left) * sxmv2 
    var mymv2 = (emv2.clientY - rmv2.top) * symv2 
    var angmv2 = Math.atan2(mymv2 - 300, mxmv2 - 400) 
    if (_spinLastAngle !== null) { 
        var deltamv2 = angmv2 - _spinLastAngle 
        if (deltamv2 > Math.PI) deltamv2 -= Math.PI * 2 
        if (deltamv2 < -Math.PI) deltamv2 += Math.PI * 2 
        _spinTotalRot += Math.abs(deltamv2) 
    } 
    _spinLastAngle = angmv2 
})
