var logicalWidth = 800;
var logicalHeight = 600;
var cssScale = 1;
var cssOffsetX = 0;
var cssOffsetY = 0;

function resizeCanvas() {
    var dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    cssScale = Math.min(window.innerWidth / logicalWidth, window.innerHeight/logicalHeight );
    cssOffsetX = (window.innerWidth - logicalWidth * cssScale) / 2;
    cssOffsetY = (window.innerHeight - logicalHeight * cssScale) / 2;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function getLogicalPos(e) {
    var rect = canvas.getBoundingClientRect();
    return {
            x: (e.clientX - rect.left - cssOffsetX) / cssScale,
            y: (e.clientY - rect.top - cssOffsetY) / cssScale
    };
}

function startAudio() {
    if (audioSrc) {
        try { audioSrc.stop() } catch(err) { console.log('audio already stopped or whatever') }
        audioSrc = null
    }
    audioLoaded = false
 
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    audioCtx.resume()
 
    gainNode = audioCtx.createGain()
    gainNode.gain.value = parseFloat(document.getElementById('volumeslider').value)
    gainNode.connect(audioCtx.destination)
 
    if (audioBuffer) {
        audioSrc = audioCtx.createBufferSource()
        audioSrc.buffer = audioBuffer
        audioSrc.connect(gainNode)
        audioSrc.start(0)
        audioStartOffset = audioCtx.currentTime
        audioLoaded = true
        console.log('audio started!!')
    } else {
        console.log('no audio file, using silent clock')

function getTotalStats() {
    var t300 = 0, t100 = 0, t50 = 0, tmiss = 0
    var bestcombo = 0
    var playsPerMap = {}
    var diffslist2 = [diffEasy, diffNormal, diffHard]

    for (var mi = 0; mi < maps.length; mi++) {
        var mm = maps[mi]
        playsPerMap[mm.id] = 0
          for (var dii = 0; dii < diffslist2.length; dii++) {
            var lb2 = getLeaderBoard(mm.id, diffslist2[dii].label)
              for (var li2 = 0; li2 < lb2.length; li2 ++) {
                  var ee = lb2[li2]
                  playsPerMap[mm.id]++
                  t300 += ee.counts ? ee.counts[300] || 0 : 0
                  t100 += ee.counts ? ee.counts[100] || 0 : 0
                  t50 += ee.counts ? ee.counts[50] || 0 : 0
                  tmiss += ee.counts ? ee.counts.miss || 0 : 0
                    if (ee.maxCombo > bestcombo) bestcombo = ee.maxCombo
              }
          }             
}

  var allNotes = t300 + t100 + t50 + tmiss
  var weighted = t300*300 + t100*100 + t50*50
  var maxP = allNotes * 300
  var overallAcc2 = maxP > 0? (weighted/ maxP) * 100 : 0

  var mostPlayedTitle = 'none'
  var mostPlayedCount = 0 
  for ( var mapId in playsPerMap) {
      if (playsPerMap[mapId] > mostPlayedCount) {
          mostPlayedCount = playsPerMap[mapId]
            for (var mi2 = 0; mi2 < maps.length; mi2++) {
                  if (maps[mi2].id == mapId) { mostPlayedTitle = maps[mi2].title; break}
            }
      }
  }

    return {
            t300: t300, t100: t100, t50: t50, tmiss: tmiss,
            bestcombo: bestcombo ,
            overallAcc: overallAcc2.toFixed(2),
            mostplayed: mostPlayedTitle
    }
}

function getBestGradesPerMap() {
        var diffList3 = [diffEasy, diffNormal, diffHard]
        var out = []
        for (var mi3 = 0; mi3 < maps.length; mi3++) {
        var mm2 = maps[mi3]
        var bestGrade = '-'
        var bestSc = 0
        for (var dii2 = 0; dii2 < diffList3.length; dii2++) {
            var lb3 = getLeaderBoard(mm2.id, diffList3[dii2].label)
            if (lb3.length > 0 && lb3[0].score > bestSc)  {
                bestSc = lb3[0].score
                bestGrade = lb3[0].grade
            }
        }
out.push({ title: mm2.title, grade: bestGrade})
        } 
return out
}

    { label: 'Exit', bgStart: '#e52d27', bgEnd: '#b31217', icon: '✖' } 
]

            iconArea.style.cssText = 'font-size:18px;color:#ffffff;opacity:0.8;position:relative;z-index:1;'
            iconArea.textContent = opt.icon
            btn.appendChild(iconArea)

            btn.addEventListener('mouseover', function() {
                btn.style.transform = 'scale(1.02) translateX(-10px)'
                bg.style.filter = 'brightness(1.2)'
            })
            btn.addEventListener('mouseout', function() {
                btn.style.transform = 'scale(1) translateX(0px)'
                bg.style.filter = 'brightness(1)'
            })

            btn.addEventListener('click', function() {
                if (opt.label == 'Resume') {
                    pauseOpen = false
                    pauseDiv.style.display = 'none'
                    if (!audioLoaded) gamestartTime += Date.now() - _pausedAt
                    if (audioCtx) audioCtx.resume()
                } else if (opt.label == 'Restart') {
                    pauseOpen = false
                    pauseDiv.style.display = 'none'
                    if (audioCtx) audioCtx.resume()
                    loadMap(selectedMap)
                    startAudio()
                } else if (opt.label == 'Song Select') {
                    pauseOpen = false
                    pauseDiv.style.display = 'none'
                    if (audioSrc) { try { audioSrc.stop() } catch(e) {} }
                    if (audioCtx) audioCtx.resume()
                    showMainMenu()
                    buildSongSelect()
                    ssDiv.style.display = 'flex'
                } else if (opt.label == 'Settings') {
                    buildSettingsPanel()
} else if (opt.label == 'Exit') {
        pauseOpen = false
        pauseDiv.style.display = 'none'
        if (audioSrc) { try { audioSrc.stop() } catch(e) {} }
        if (audioCtx) audioCtx.resume()
        gamestate = 'menu'
        score = 0
        combo = 0
        showMainMenu()
                }
            })
            btnWrap.appendChild(btn)
        })(opts[_pbi])
    }

    inner.appendChild(btnWrap)
    pauseDiv.appendChild(inner)

    if (!_pauseLogoImg.complete) {
        _pauseLogoImg.onload = function() {

            lctx.clip()
            lctx.drawImage(_pauseLogoImg, 0, 0, 280, 280)

document.addEventListener('keydown', function(ekd) {
    if (ekd.key != 'Escape') return
    if (gamestate != 'playing' && !pauseOpen) return
    if (!pauseOpen) {
        pauseOpen = true
        _pausedAt = Date.now()
        if (audioCtx) audioCtx.suspend()
        buildPauseMenu()
        pauseDiv.style.display = 'flex'
    } else {
        pauseOpen = false
        pauseDiv.style.display = 'none'
        if (!audioLoaded) gamestartTime += Date.now() - _pausedAt
        if (audioCtx) audioCtx.resume()
    }
})
