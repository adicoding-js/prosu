    <style>
            body { 
                    margin: 0;
                    background: #1f1f1f;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    height: 100vh;
                    cursor: none;
            }
canvas { display: block; }

    #startButton { margin-top: 16px;
                    padding: 10px 32px;
                    background: #ffffff;
                    border: 1px solid #555;
                    font-family: Arial, Helvetica, sans-serif;
                    font-size: 16px;

<body>
<canvas id = "Canvas" width=" 800" height="600"></canvas>
<button id = "startButton">START GAME </button>
<script>  

var canvas = document.getElementById('Canvas')
var ctx = canvas.getContext('2d')

var mouseX = 400
var mouseY = 300
var mouseMoved = false

document.addEventListener('mousemove', function(e) {
var rect = canvas.getBoundingClientRect()
var scaleX = canvas.width / rect.width
var scaleY = canvas.height / rect.height
mouseX = (e.clientX - rect.left ) * scaleX
mouseY = (e.clientY - rect.top ) * scaleY
mouseMoved = true
})

var score = 0
var combo = 0
var hitAnims = []

var jp = []

var judgementPopups = jp

var count300 = 0
var count100 = 0
var count50 = 0
var countMiss = 0
var total = 5

var Circles = [
    { x: 200, y: 200, radius: 40, number: 1, color: '#4a90d9', spawnTime: 500, hitTime: 1800 },
    { x: 550, y: 180, radius: 40, number: 2, color: '#4a90d9', spawnTime: 1600, hitTime: 2900 },
    { x: 350, y: 380, radius: 40, number: 3, color: '#4a90d9', spawnTime: 2700, hitTime: 4000 },

]

var pMs = 800

id: 'map_1',

// this took a hell lot of time T_T!

    { type: 'circle', x: 620, y: 350, time: 5000},
    { type: 'circle', x: 400, y: 150, time: 5600},
    { type: 'circle', x: 250, y: 420, time: 7000},
    { type: 'circle', x: 600, y: 280, time: 7600},
    { type: 'circle', x: 150, y: 200, time: 8200},

    { type: 'circle', x: 300, y: 300, time: 10200},
    { type: 'circle', x: 650, y: 180, time: 11600},
    { type: 'circle', x: 180, y: 450, time: 12200},
    { type: 'circle', x: 550, y: 320, time: 12800},
    { type: 'circle', x: 350, y: 150, time: 14200},
    { type: 'circle', x:200, y: 380, time: 14800},
    { type: 'circle', x:620, y:420 , time: 15400},
    { type: 'circle', x:400, y:250 , time: 16000},
    { type: 'circle', x:150, y:300 , time: 17400},
    { type: 'circle', x:580, y: 200, time: 18000},
    { type: 'circle', x:320, y: 450, time: 19400},
    { type: 'circle', x:680, y:350 , time: 20000},
    { type: 'circle', x:250, y:150 , time: 20600},
    { type: 'circle', x:480, y:430 , time: 22000},
    { type: 'circle', x:150, y: 380, time: 22600},
    { type: 'circle', x:400, y: 200, time: 23200},
    { type: 'circle', x:600, y:400 , time: 23800},  
    { type: 'circle', x:200, y:300 , time: 25200},
    { type: 'circle', x:500, y:150 , time: 25800},
    { type: 'circle', x:350, y:430 , time: 26400}
]

}

canvas.addEventListener('mousedown', function(e) {
var rect = canvas.getBoundingClientRect()
var scaleX = canvas.width / rect.width
var scaleY = canvas.height / rect.height
var clickX = (e.clientX - rect.left) * scaleX
var clickY = (e.clientY - rect.top) * scaleY
 
for (var i = activeCircles.length - 1; i >= 0; i--) {
  var c = activeCircles[i]
  var dx = clickX - c.x
  var dy = clickY - c.y
  var dist = Math.sqrt(dx*dx + dy*dy)
  if (dist <= c.radius) {
    console.log('hit', c.number)

//this was made by me, previous commit shows what was made with the help of ai

  var now2 = Date.now() - gamestartTime
var diff = Math.abs(now2 - c.hitTime)
var judgetxt = ''
var judgeColor = ''

      if (diff <= 40) {
            score += 300
            count300 +=1
            judgetxt = '300'
            judgeColor = '#4a90d9' }

      else if ( diff <= 80 ) {
            score += 100
            count100 += 1
            judgetxt = '100'
            judgeColor = '#57c96e' }
      else if ( diff <= 120 ) {
            score += 50
            count50 += 1
            judgetxt = '50'
            judgeColor = '#888888' }
      else { console.log ('Too Early') }

jp.push({ x: c.x, y: c.y, text: judgetxt, color: judgeColor, startTime: Date.now() })
 
   combo += 1
    hitAnims.push({ x: c.x, y: c.y, radius: c.radius, startTime: Date.now(), type: 'hit' })
    c.dead = true
    activeCircles.splice(i, 1)
    break
  }
}
})

canvas.addEventListener('click', function(e) {
if (gamestate != 'results') return
var rect = canvas.getBoundingClientRect()
var scaleX = canvas.width / rect.width
var scaleY = canvas.height / rect.height
var cx = (e.clientX - rect.left) * scaleX
var cy = (e.clientY - rect.top) * scaleY
if ( cx > 240 && cx < 560 && cy > 495 && cy <535) {
  loadMap(map1)
  document.getElementById('startButton').style.display = 'none'
}
})


function loadMap(mapObj) {
Circles = []
activeCircles = []
score = 0
combo = 0
maxCombo = 0
count300 = 0
count100 = 0
count50 = 0
countMiss = 0
hitAnims = []
jp = []
judgementPopups = jp
alldone = false

for (var i = 0; i < mapObj.objects.length; i++) {
    var obj = mapObj.objects[i]
    if (obj.type  == 'circle') {
      Circles.push({
         x: obj.x,
         y: obj.y,
         radius: 40,
         number: i + 1,
         color: '#4a90d9',
         spawnTime: obj.time - pMs,
         hitTime: obj.time,
         spawned: false,
         dead: false
})
    }
}

total = Circles.length
gamestartTime = Date.now()
gamestate = 'playing'
}

document.getElementById('startButton').onclick = function() {
    loadMap(map1)
    document.getElementById('startButton').style.display = 'none'
}

function getGrade() {
var t = count300 * 300 + count100 * 100 + count50 * 50
var m = total * 300
var a = m > 0 ? ( t / m) * 100 : 0
if( a >= 95) return 'Goated'
if ( a>= 90) return 'A-Tier Elite'
if ( a >= 80) return 'B-Tier Average' 
if ( a >= 70) return 'C-Tier Hobbyist'
return 'NOOB'
}

function draw() {
ctx.clearRect(0,0,800,600)

ctx.fillStyle = '#1a1a1a'
ctx.fillRect(0,0,800,600)
if (gamestate == 'results') {
drawResults()
requestAnimationFrame(draw)
return
}

if (gamestate == 'menu') {
ctx.font = 'bold 48px Helvetica'
ctx.fillStyle = '#ffffff'
ctx.textAlign = 'center'
ctx.fillText('prosu!', 400, 200)
ctx.beginPath()
ctx.arc(mouseX, mouseY, 18, 0, Math.PI * 2)
ctx.strokeStyle = '#ffffff'
ctx.lineWidth = 2 
ctx.stroke()
requestAnimationFrame(draw)
return
}



/*ctx.font = 'bold 48px Helvetica'
ctx.fillStyle = '#ffffff'
ctx.textAlign = 'center'
ctx.fillText('prosu!', 400, 60)

ctx.font = 'bold 48px Helvetica'
ctx.fillStyle = '#ffffff'
ctx.textAlign = 'center'
ctx.fillText('prosu!', 400, 60)*/


ctx.font = 'bold 48px Helvetica'
ctx.fillStyle = '#ffffff'
ctx.textAlign = 'left'
ctx.fillText('score: ' + score, 12, 36)

ctx.font = 'bold 22px Courier'
ctx.fillText(combo + 'x', 12, 62)


var totalHit = count300 * 300 + count100 * 100 + count50 * 50
var max = (count300 + count100 + count50 + countMiss) * 300
var accuracy = 100
if (max > 0) {
accuracy = (totalHit / max ) * 100
}
 var accStr = accuracy.toFixed(2) + '%'
ctx.font = 'bold 22px helvetica'
ctx.textAlign = 'right'
ctx.fillStyle = '#ffffff'
ctx.fillText(accStr, 788, 36) 

var now = Date.now() - gamestartTime
for (var i = 0; i < Circles.length; i++) {
  var c = Circles[i]
   if (now >= c.spawnTime && !c.spawned && !c.dead) {
    c.spawned = true
activeCircles.push(c)
}
}

for (var i = activeCircles.length - 1; i >= 0; i--) {
  var c = activeCircles[i]
if (now > c.hitTime + 200) {
 console.log('miss', c.number)
combo = 0
countMiss += 1
judgementPopups.push({ x: c.x, y: c.y, text: 'MISS', color: '#e05555', startTime: Date.now() })
hitAnims.push({ x: c.x, y: c.y, radius: c.radius, startTime: Date.now(), type: 'miss'})
c.dead = true
activeCircles.splice(i, 1)
}
}

for (var i = 0; i < activeCircles.length; i++) {
  var c = activeCircles[i]


 var t = (now - c.spawnTime) / (c.hitTime - c.spawnTime)
    if ( t > 1) t=1

 var approachR = c.radius * 3 - (c.radius * 3 - c.radius) * t

ctx.beginPath()
ctx.arc(c.x, c.y, approachR, 0, Math.PI * 2)
ctx.strokeStyle = '#ffffff'
ctx.lineWidth = 2
ctx.stroke()

ctx.beginPath()
ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2)
ctx.fillStyle = c.color
ctx.fill()
ctx.strokeStyle = '#ffffff'
ctx.lineWidth = 3
ctx.stroke()
}

ctx.font = 'bold 24px Arial'
ctx.fillStyle = '#ffffff'
ctx.textAlign = 'center'
ctx.textBaseline = 'middle'
ctx.fillText(c.number, c.x, c.y)
ctx.textBaseline = 'alphabetic'

var nowMs = Date.now()
for (var i = hitAnims.length - 1; i >= 0; i--) {
  var a = hitAnims[i]
  var elapsed = nowMs - a.startTime
  if (elapsed > 150) {
    hitAnims.splice(i, 1)
    continue
  }
  var progress = elapsed / 150
  var alpha = 1 - progress
  if (a.type == 'hit') {
    var shrinkR = a.radius * (1 - progress * 0.5)
    ctx.beginPath()
    ctx.arc(a.x, a.y, shrinkR, 0, Math.PI * 2)
    ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')'
    ctx.fill()
  } else {
    ctx.beginPath()
    ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2)
    ctx.fillStyle = 'rgba(220,50,50,' + alpha + ')'
    ctx.fill()
  }
}

for (var i = jp.length - 1; i >= 0; i--) {
  var jp2 = judgementPopups[i]
  var jElapsed = nowMs - jp2.startTime
if (jElapsed > 600 ) {
    judgementPopups.splice(i, 1) 
continue }

var jProgress = jElapsed / 600
var jAlpha = 1 - jProgress
var jy = jp2.y - jProgress * 30
ctx.font = 'bold 24px helvetica'
ctx.fillStyle = 'rgba(' + hexToRgb(jp2.color) + ',' + jAlpha + ')'
ctx.textAlign = 'center'
ctx.textBaseline = 'middle'
ctx.fillText(jp2.text, jp2.x, jy)
ctx.textBaseline = 'alphabetic' 
}

ctx.beginPath()
ctx.arc(mouseX, mouseY, 18, 0, Math.PI * 2)
ctx.strokeStyle = '#ffffff'
ctx.lineWidth = 2
ctx.stroke()

ctx.beginPath()
ctx.moveTo(mouseX - 5, mouseY)
ctx.lineTo(mouseX + 5, mouseY)
ctx.moveTo(mouseX, mouseY -5)
ctx.lineTo(mouseX, mouseY + 5)
ctx.strokeStyle = '#ffffff'
ctx.lineWidth = 1
ctx.stroke()
requestAnimationFrame(draw)

if ( combo > maxCombo) maxCombo = combo

var alldead = true 
for ( var ii = 0; ii < Circles.length; ii++) {
  if (!Circles[ii].dead) { alldead = false; break }
}
if (alldead && activeCircles.length == 0 && Circles.length > 0 && !alldone) {
      alldone = true
  setTimeout(function() { gamestate = 'results'}, 700 )
}
}


function drawResults() { 
ctx.font = 'bold 36px Helvetica'
ctx.fillStyle = '#ffffff'
ctx.textAlign = 'center'
ctx.fillText(map1.title, 400, 75)
ctx.font = '18px Courier'
ctx.fillStyle = '#aaaaaa'
ctx.fillText('by' + map1.artist, 400, 105)
ctx.font = 'bold 110px Helvetica'
ctx.fillStyle = '#4a90d9'
ctx.fillText(getGrade(), 400, 265)
ctx.font = 'bold 36px Helvetica'
ctx.fillStyle = '#ffffff'
ctx.fillText('score: ' + score, 400,325)

var th = count300*300 + count100*100 + count50*50
var mh = total * 300
var ar = mh > 0 ? (th/mh) * 100 : 100

ctx.fillText('accuracy: ' + ar.toFixed(2) + '%', 400, 362) 
ctx.fillText('Max Combo: ' + maxCombo + 'x', 400, 399)
ctx.font = '20px Courier'

ctx.fillText('Miss: ' + countMiss, 57, 445)
ctx.font = 'bold 24px Helvetica'
ctx.fillStyle = '#ffffff'
ctx.fillText('[ Play Again ]', 400, 520)
ctx.beginPath()
ctx.arc(mouseX, mouseY, 18, 0, Math.PI * 2)
ctx.strokeStyle = '#ffffff'
ctx.lineWidth = 2
ctx.stroke() 
} 


//I FOUND THIS COOL THING/FUNCTION ON STACKOVERFLOW

function hexToRgb(hex) {
var r = parseInt(hex.slice(1,3), 16)
var g = parseInt(hex.slice(3,5), 16)
var b = parseInt(hex.slice(5,7), 16)
return r + ',' + g + ',' + b
}

draw()
