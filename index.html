var audioCtx = null
var gainNode = null
var audioBuffer = null
var audioSrc = null
var audioLoaded = false
var audioStartOffset = 0

document.getElementById('audioUpload').addEventListener('change', function(e)
{ var file = e.target.files[0]
if (!file) return 
var reader = new FileReader()
reader.onload = function(ev) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
        audioCtx.decodeAudioData(ev.target.result, function (buf) {
        audioBuffer = buf
        console.log('audio loaded!!', buf.duration)
        }, function() {
            alert('didnt work')
        }
)}
    reader.readAsArrayBuffer(file)
})

document.getElementById('volumeslider').addEventListener('input', function() {
    if (gainNode) gainNode.gain.value = this.value
    document.getElementById('vollabel').textContent = 'volume: ' + Math.round(this.value * 100) + '%'
})

function startAudio() {
    if (audioSrc) {
        try { audioSrc.stop() } catch(err) { console.log('audio already stopped or whatever') }
        audioSrc = null
    }
    audioLoaded = false
 
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    audioCtx.resume()
 
    gainNode = audioCtx.createGain()
    gainNode.gain.value = parseFloat(document.getElementById('volumeslider').value)
    gainNode.connect(audioCtx.destination)
 
    if (audioBuffer) {
        audioSrc = audioCtx.createBufferSource()
        audioSrc.buffer = audioBuffer
        audioSrc.connect(gainNode)
        audioSrc.start(0)
        audioStartOffset = audioCtx.currentTime
        audioLoaded = true
        console.log('audio started!!')
    } else {
        console.log('no audio file, using silent clock')
    }
}

function getGrade() {
var t = count300 * 300 + count100 * 100 + count50 * 50

var a = m > 0 ? ( t / m) * 100 : 0

if ( a>= 90) return 'A-Tier Elite'
if ( a >= 80) return 'B-Tier Average' 
if ( a >= 70) return 'C-Tier Hobbyist'
return 'NOOB'
}

function hexToRgb(hex) {
var r = parseInt(hex.slice(1,3), 16)
var g = parseInt(hex.slice(3,5), 16)
var b = parseInt(hex.slice(5,7), 16)
return r + ',' + g + ',' + b
}

ssDiv.style.cssText = 'display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;z-index:99;font-family:Arial;color:#fff;box-sizing:border-box;cursor:auto'
document.body.appendChild(ssDiv)

function buildSongSelect() {
  ssDiv.innerHTML = ''
  var inner = document.createElement('div')
  inner.style.cssText = 'display:flex;width:100%;height:100%'


  var leftpanel = document.createElement('div')
  leftpanel.style.cssText = 'width:55%;height:100%;overflow-y:auto;padding:24px 20px;box-sizing:border-box;border-right:1px solid #2e2e2e'
  var heading = document.createElement('div')
  heading.style.cssText = 'font-size:20px;font-weight:bold;margin-bottom:18px;letter-spacing:1px'
  heading.textContent = 'Song Selection'
  leftpanel.appendChild(heading)

  for (var i = 0 ; i < maps.length; i++) {
      (function(m) {
      var card = document.createElement('div')
      var borderCol = '#4a90d9'
      if (m.bpm >= 150) borderCol = '#e05555'
      else if (m.bpm >= 130) borderCol = '#d4a017'
      card.style.cssText = 'background:#242424;margin-bottom:8px;padding:12px 14px;cursor:pointer;border-left:4px solid ' + borderCol + ';box-sizing:border-box'


    var titleEl = document.createElement('div')
    titleEl.style.cssText = 'font-size:15px;font-weight:bold;margin-bottom:4px'
    titleEl.textContent = m.title
    card.appendChild(titleEl)


    var subEl = document.createElement('div')
    subEl.style.cssText = 'font-size:12px;color:#aaa;font-family:Courier,monospace'
    subEl.textContent = m.artist + '  ' + m.objects.length + 'notes' + m.bpm + 'bpm'
    card.appendChild(subEl)

    if (selectedMap == m) card.style.background = '#1e3a5f'

    card.addEventListener('mouseover', function() {
      if (selectedMap != m) card.style.background = '#2c2c2c'
    })
    
    card.addEventListener('mouseout', function() {
      if (selectedMap !=m) card.style.background = '#242424'
      })

    card.addEventListener('click', function() {
      selectedMap = m   
      buildSongSelect()
    })

    leftpanel.appendChild(card)
      }) (maps[i])
  }

var uploadCard = document.createElement('div')
uploadCard.style.cssText = 'background:#1e1e1e;margin-bottom:8px;padding:12px 14px;cursor:pointer;border-left:4px solid #555;box-sizing:border-box;color:#888'
uploadCard.textContent = '+ upload your own audio'
uploadCard.addEventListener('mouseover', function() {
uploadCard.style.color = '#ccc'
})
uploadCard.addEventListener('mouseout', function() {
uploadCard.style.color = '#888'
})
uploadCard.addEventListener('click', function() {
document.getElementById('audioUpload').click()
})
leftpanel.appendChild(uploadCard)
var rightPanel = document.createElement('div')
rightPanel.style.cssText = 'width:45%;height:100%;padding:32px 28px;box-sizing:border-box;display:flex;flex-direction:column'
inner.appendChild(rightPanel)
var rTitle = document.createElement('div')
rTitle.style.cssText = 'font-size:28px;font-weight:bold;margin-bottom:6px'
rTitle.textContent = selectedMap.title
rightPanel.appendChild(rTitle)
var rArtist = document.createElement('div')
rArtist.style.cssText = 'font-size:14px;color:#aaa;margin-bottom:24px'
rArtist.textContent = selectedMap.artist
rightPanel.appendChild(rArtist)
var rInfo = document.createElement('div')
rInfo.style.cssText = 'font-family:Courier,monospace;font-size:13px;color:#bbb;line-height:2'
rInfo.innerHTML = 'bpm: ' + selectedMap.bpm + '<br>notes: ' + selectedMap.objects.length + '<br>id: ' + selectedMap.id
rightPanel.appendChild(rInfo)
var spacer = document.createElement('div')
spacer.style.cssText = 'flex:1'
rightPanel.appendChild(spacer)
var playBtn = document.createElement('button')
playBtn.textContent = 'PLAY'
playBtn.style.cssText = 'background:#4a90d9;color:#fff;border:none;padding:13px 0;font-size:17px;cursor:pointer;width:150px;margin-bottom:10px'
playBtn.addEventListener('click', function() {
  ssDiv.style.display = 'none'
  startAudio()
  loadMap(selectedMap)
})
rightPanel.appendChild(playBtn)

var backBtn = document.createElement('button')
backBtn.textContent = 'back'
backBtn.style.cssText = 'background:transparent;color:#666;border:1px solid #333;padding:8px 0;font-size:13px;cursor:pointer;width:100px'
backBtn.addEventListener('click', function() {
  ssDiv.style.display = 'none'
  document.getElementById('startButton').style.display = 'block'
  document.getElementById('audioUpload').style.display = 'block'
  document.getElementById('volumeslider').style.display = 'block'
  document.getElementById('vollabel').style.display = 'block'
})
rightPanel.appendChild(backBtn)

inner.appendChild(leftpanel)
ssDiv.appendChild(inner)
}

document.getElementById('startButton').onclick = function() {
  buildSongSelect()
  ssDiv.style.display = 'flex'
  document.getElementById('startButton').style.display = 'none'
  document.getElementById('audioUpload').style.display = 'none'
  document.getElementById('volumeslider').style.display = 'none'
  document.getElementById('vollabel').style.display = 'none'
}

draw()
</script>
 
</body>
</html>
